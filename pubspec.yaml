name: absensi_pegawai
description: "A web-based employee attendance system using QR code and Supabase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"   # ✅ pakai rentang stabil (cocok utk Flutter 3.22–3.24)

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Icons ---
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # --- Backend & Database ---
  supabase_flutter: ^2.6.0

  # --- QR & Scanner ---
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.1

  # --- Geolocation ---
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # --- Utilitas ---
  intl: ^0.19.0
  flutter_hooks: ^0.20.5
  # --- PDF export ---
  pdf: ^3.10.1
  printing: ^5.13.4
  path_provider: ^2.1.5

  # --- Charts ---
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png   # pastikan file ini benar-benar ada; kalau belum, hapus baris ini
    - assets/images/signature_budi.png
    - assets/images/signature_iskandar.png
